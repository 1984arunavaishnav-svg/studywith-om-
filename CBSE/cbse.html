<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CBSE Study Material | StudyWithOm - Class 1 to 12 Notes & Chapters</title>

    <meta name="description"
        content="Access free CBSE study material for Class 1 to 12. Explore chapter-wise notes, PDFs, video lectures and quizzes on StudyWithOm.">

    <meta name="robots" content="index, follow">

    <link rel="icon" type="image/png" href="../assets/images/logo.png">

    <link rel="stylesheet" href="cbse.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>
<img src="../assets/images/logo.png" class="top-logo" alt="StudyWithOm Logo">
<div class="container">

    <a href="../School.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <div class="hero">

        <h1>
            <i class="fa-solid fa-book-open-reader"></i>
            CBSE
        </h1>

        <p>Choose Your Class</p>

    </div>

    <hr>

    <div class="study-panel">

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Search Class, Subject or Chapter...">

        </div>


        <div class="select-box">

            <label for="classSelect">Select Class</label>

            <select id="classSelect">

                <option value="">Choose Class</option>

             <select id="classSelect">

    <option value="">
        Loading Classes...
    </option>

</select>

            

        </div>


        <div class="select-box">

            <label for="subjectSelect">Select Subject</label>

            <select id="subjectSelect" disabled>

                <option>Select Class First</option>

            </select>

        </div>


        <div class="select-box">

            <label for="chapterSelect">Select Chapter</label>

            <select id="chapterSelect" disabled>

                <option>Select Subject First</option>

            </select>

        </div>

    </div>

</div>


<script type="module" src="cbse.js"></script>
</body>
</html>
