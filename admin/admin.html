<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudyWithOm Admin Panel</title>

<link rel="stylesheet" href="admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>


<body>


<header class="topbar">

    <div class="logo">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>StudyWithOm CMS</span>
    </div>


    <div class="admin-profile">

        <i class="fa-solid fa-user-shield"></i>
        Admin

    </div>

</header>



<div class="container">


<aside class="sidebar">

<ul>

<li class="active">

<i class="fa-solid fa-layer-group"></i>
Dashboard

</li>


<li>

<i class="fa-solid fa-folder-tree"></i>
Content

</li>


<li>

<i class="fa-solid fa-file-pdf"></i>
Materials

</li>


<li>

<i class="fa-solid fa-image"></i>
Media

</li>


<li>

<i class="fa-solid fa-gear"></i>
Settings

</li>


</ul>

</aside>





<main class="main-content">



<div class="page-title">

<h2>Content Manager</h2>

<p>
Manage Categories, Boards, Classes, Subjects,
Chapters and Materials.
</p>

</div>





<!-- ================= CONTENT FORM ================= -->


<section class="content-form">


<h3>Add New Content</h3>



<form id="contentForm">



<div class="form-group">

<label>Parent</label>

<select id="parent">

<option value="">
None (Root Category)
</option>

</select>

</div>





<div class="form-group">

<label>Type</label>

<select id="type">

<option value="Category">
Category
</option>

<option value="Board">
Board
</option>

<option value="Class">
Class
</option>

<option value="Subject">
Subject
</option>

<option value="Chapter">
Chapter
</option>


</select>

</div>






<div class="form-group">

<label>Name</label>

<input
id="name"
type="text"
placeholder="Enter Name">

</div>





<div class="form-group">

<label>Display Order</label>

<input
id="order"
type="number"
value="1">

</div>





<div class="form-group">

<label>Status</label>

<select id="status">


<option value="Active">
Active
</option>


<option value="Hidden">
Hidden
</option>


</select>

</div>





<button type="submit" id="saveBtn">

<i class="fa-solid fa-plus"></i>

Save Content

</button>



</form>


</section>





<!-- ================= CONTENT TREE ================= -->


<section class="content-tree">


<h3>Website Structure</h3>


<div id="tree">

Loading...

</div>


</section>







<!-- ================= MATERIAL SYSTEM ================= -->


<section class="material-form">


<h3>Add Material</h3>




<form id="materialForm">





<div class="form-group">


<label>Chapter</label>


<select id="chapterSelect">


<option value="">

Select Chapter

</option>


</select>


</div>







<div class="form-group">


<label>Material Type</label>


<select id="materialType">


<option value="PDF">

PDF Notes

</option>


<option value="Video">

Video

</option>


<option value="Question">

Question Paper

</option>


</select>


</div>







<div class="form-group">


<label>Title</label>


<input

id="materialTitle"

type="text"

placeholder="Enter Material Name">


</div>






<div class="form-group">

    <label>Upload File</label>

    <div id="dropArea" class="drop-area">

        <i class="fa-solid fa-cloud-arrow-up"></i>

        <h3>Drag & Drop File Here</h3>

        <p>or Click to Select</p>

        <input
            type="file"
            id="materialFile"
            hidden>

    </div>

</div>

<p id="fileName"></p>


</div>






<button type="submit">

Save Material

</button>




</form>



</section>






</main>



</div>





<script type="module" src="admin.js"></script>


</body>

</html>
